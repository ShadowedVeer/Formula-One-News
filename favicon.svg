<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Racing car">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF2016"/>
      <stop offset="1" stop-color="#C90500"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="15" fill="url(#bg)"/>

  <!-- speed lines -->
  <g fill="#ffffff" opacity="0.4">
    <rect x="4" y="24" width="9"  height="2.6" rx="1.3"/>
    <rect x="3" y="31" width="12" height="2.6" rx="1.3"/>
    <rect x="5" y="38" width="8"  height="2.6" rx="1.3"/>
  </g>

  <!-- car body -->
  <g fill="#ffffff">
    <path d="M9 20.5 h9 v3 h-2.6 v13 h-3.2 v-13 H9 z"/>
    <path d="M13 42 L14.5 34.6 C16 33 22 32.6 25.5 32.6 C26.6 26.4 31 26 32.6 31 C40 32 50 33.6 59 38 L60.4 39.6 C59 40.6 57 40.9 54 40.9 L16 40.9 Z"/>
    <rect x="52" y="40.4" width="10.5" height="3.2" rx="1"/>
  </g>

  <!-- cockpit opening -->
  <path d="M31.5 31.6 C32.6 29 36 29 36.4 31.8 L35.2 33 L32.4 33 Z" fill="#C90500"/>

  <!-- wheels -->
  <g>
    <circle cx="20" cy="43" r="8.6" fill="#141519"/>
    <circle cx="20" cy="43" r="4"   fill="#ffffff"/>
    <circle cx="20" cy="43" r="1.7" fill="#C90500"/>
    <circle cx="47" cy="43" r="8.6" fill="#141519"/>
    <circle cx="47" cy="43" r="4"   fill="#ffffff"/>
    <circle cx="47" cy="43" r="1.7" fill="#C90500"/>
  </g>
</svg>
